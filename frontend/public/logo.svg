<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: dark navy with rounded corners, flush to edges -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1a2235"/>

  <!-- Outer brushstroke circle (open, gap at bottom-left) -->
  <path d="M256 80
    a176 176 0 1 1 -124.45 51.55"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    opacity="0.95"/>

  <!-- S letterform — brushstroke style, white -->
  <path d="M300 175
    c0 0 -20 -18 -50 -18
    c-35 0 -58 22 -58 50
    c0 28 20 42 55 52
    c35 10 58 26 58 56
    c0 32 -26 54 -65 54
    c-32 0 -54 -16 -60 -22"
    fill="none"
    stroke="white"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"/>

  <!-- Three teal speed lines (left side, staggered) -->
  <line x1="108" y1="228" x2="178" y2="228" stroke="#4ecdc4" stroke-width="18" stroke-linecap="round"/>
  <line x1="96"  y1="268" x2="162" y2="268" stroke="#4ecdc4" stroke-width="18" stroke-linecap="round"/>
  <line x1="108" y1="308" x2="170" y2="308" stroke="#4ecdc4" stroke-width="18" stroke-linecap="round"/>
</svg>
